spring:
  application:
    name: echomind-user-memory
  main:
    web-application-type: none
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:echomind}
    password: ${RABBITMQ_PASSWORD:echomind_secret}
    publisher-confirm-type: correlated
    publisher-returns: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration

otel:
  service:
    name: ${OTEL_SERVICE_NAME:echomind}
  traces:
    exporter: ${OTEL_TRACES_EXPORTER:none}
  metrics:
    exporter: ${OTEL_METRICS_EXPORTER:none}
  logs:
    exporter: ${OTEL_LOGS_EXPORTER:none}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}
  resource:
    attributes: deployment.environment=${ECHOMIND_ENV:local}

echomind:
  rabbitmq:
    retry:
      max-attempts: ${ECHOMIND_RABBITMQ_RETRY_MAX_ATTEMPTS:3}
      initial-interval-ms: ${ECHOMIND_RABBITMQ_RETRY_INITIAL_INTERVAL_MS:1000}
      multiplier: ${ECHOMIND_RABBITMQ_RETRY_MULTIPLIER:5}
      max-interval-ms: ${ECHOMIND_RABBITMQ_RETRY_MAX_INTERVAL_MS:30000}
  user-memory:
    enabled: ${USER_MEMORY_ENABLED:true}
    queue-name: ${USER_MEMORY_QUEUE_NAME:echomind.user-memory.requests}
    profile-key-prefix: ${USER_MEMORY_PROFILE_KEY_PREFIX:echomind:user-profile:snapshot:}
    existing-profile-limit: ${USER_MEMORY_EXISTING_PROFILE_LIMIT:30}
    max-extracted-entries: ${USER_MEMORY_MAX_EXTRACTED_ENTRIES:10}
    min-confidence: ${USER_MEMORY_MIN_CONFIDENCE:0.3}
    merge-min-similarity: ${USER_MEMORY_MERGE_MIN_SIMILARITY:${USER_MEMORY_MIN_SIMILARITY:0.65}}
    related-fact-top-k: ${USER_MEMORY_RELATED_FACT_TOP_K:12}
    profile-max-chars: ${USER_MEMORY_PROFILE_MAX_CHARS:2000}
    extractor-model-id: ${USER_MEMORY_EXTRACTOR_MODEL_ID:deepseek:deepseek-v4-flash}
    milvus-host: ${ECHOMIND_MILVUS_HOST:localhost}
    milvus-port: ${ECHOMIND_MILVUS_PORT:19530}
    milvus-user-memory-collection: ${ECHOMIND_MILVUS_USER_MEMORY_COLLECTION:echomind_user_memory_spring_ai_v1}
    embedding-base-url: ${ALIYUN_BAILIAN_EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
    embedding-api-key: ${ALIYUN_BAILIAN_API_KEY:}
    embedding-model: ${USER_MEMORY_EMBEDDING_MODEL:text-embedding-v4}
    embedding-dimension: ${USER_MEMORY_EMBEDDING_DIMENSION:1024}
    deep-seek-api-key: ${DEEPSEEK_API_KEY:${ANTHROPIC_API_KEY:}}
    deep-seek-base-url: ${DEEPSEEK_BASE_URL:${ANTHROPIC_BASE_URL:https://api.deepseek.com}}
    deep-seek-model: ${USER_MEMORY_DEEPSEEK_MODEL:deepseek-v4-flash}
    open-ai-compatible-provider: ${USER_MEMORY_OPENAI_PROVIDER:aliyun-bailian}
    open-ai-compatible-api-key: ${ALIYUN_BAILIAN_API_KEY:${OPENAI_API_KEY:}}
    open-ai-compatible-base-url: ${ALIYUN_BAILIAN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    open-ai-compatible-model: ${USER_MEMORY_OPENAI_MODEL:qwen-plus}
