spring:
  application:
    name: echomind-user-memory
  main:
    web-application-type: none
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:echomind}
    password: ${RABBITMQ_PASSWORD:echomind_secret}
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

echomind:
  user-memory:
    enabled: ${USER_MEMORY_ENABLED:true}
    queue-name: ${USER_MEMORY_QUEUE_NAME:echomind.user-memory.requests}
    vector-index-name: ${USER_MEMORY_VECTOR_INDEX_NAME:idx:user:memory:vectors}
    vector-key-prefix: ${USER_MEMORY_VECTOR_KEY_PREFIX:user:memory:vector:}
    existing-profile-limit: ${USER_MEMORY_EXISTING_PROFILE_LIMIT:30}
    max-extracted-entries: ${USER_MEMORY_MAX_EXTRACTED_ENTRIES:10}
    extractor-model-id: ${USER_MEMORY_EXTRACTOR_MODEL_ID:}
    embedding-base-url: ${ALIYUN_BAILIAN_EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com}
    embedding-api-key: ${ALIYUN_BAILIAN_API_KEY:}
    embedding-model: ${USER_MEMORY_EMBEDDING_MODEL:tongyi-embedding-vision-plus}
    deep-seek-api-key: ${DEEPSEEK_API_KEY:${ANTHROPIC_API_KEY:}}
    deep-seek-base-url: ${DEEPSEEK_BASE_URL:${ANTHROPIC_BASE_URL:https://api.deepseek.com/anthropic}}
    deep-seek-model: ${USER_MEMORY_DEEPSEEK_MODEL:deepseek-v4-flash}
    open-ai-compatible-provider: ${USER_MEMORY_OPENAI_PROVIDER:aliyun-bailian}
    open-ai-compatible-api-key: ${ALIYUN_BAILIAN_API_KEY:${OPENAI_API_KEY:}}
    open-ai-compatible-base-url: ${ALIYUN_BAILIAN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    open-ai-compatible-model: ${USER_MEMORY_OPENAI_MODEL:qwen-plus}
