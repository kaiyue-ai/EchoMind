server:
  port: 8080
  tomcat:
    threads:
      max: 500
      min-spare: 20
    accept-count: 300
    max-connections: 20000
    connection-timeout: 120000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

spring:
  application:
    name: echomind
  servlet:
    multipart:
      # 聊天图片和 Skill JAR 都走 multipart/form-data；这里和前端 Nginx 限制保持一致。
      max-file-size: 10MB
      max-request-size: 12MB
  profiles:
    active: dev
  thymeleaf:
    cache: false
  datasource:
    url: jdbc:h2:file:./data/echomind-db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
  shell:
    interactive:
      enabled: true
    non-interactive:
      enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:echomind}
    password: ${RABBITMQ_PASSWORD:echomind_secret}

otel:
  service:
    name: ${OTEL_SERVICE_NAME:echomind}
  traces:
    exporter: ${OTEL_TRACES_EXPORTER:none}
  metrics:
    exporter: ${OTEL_METRICS_EXPORTER:none}
  logs:
    exporter: ${OTEL_LOGS_EXPORTER:none}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}
  resource:
    attributes: deployment.environment=${ECHOMIND_ENV:local}

echomind:
  auth:
    # 客户端用户 access token 使用 HS256 JWT；Filter 校验后写入 AuthContext ThreadLocal。
    token-secret: ${ECHOMIND_AUTH_TOKEN_SECRET:echomind-dev-secret}
    token-ttl-seconds: ${ECHOMIND_AUTH_TOKEN_TTL_SECONDS:604800}
  admin:
    # 管理端使用独立 HS256 JWT 和 AdminContext，不能和客户端 token 混用。
    token-secret: ${ECHOMIND_ADMIN_TOKEN_SECRET:echomind-admin-dev-secret}
    token-ttl-seconds: ${ECHOMIND_ADMIN_TOKEN_TTL_SECONDS:604800}
  rabbitmq:
    chat-request:
      # 固定较高消费者数并降低 prefetch，避免短突发压测时少量消费者预取过多消息。
      concurrent-consumers: ${ECHOMIND_RABBITMQ_CHAT_REQUEST_CONSUMERS:20}
      max-concurrent-consumers: ${ECHOMIND_RABBITMQ_CHAT_REQUEST_MAX_CONSUMERS:20}
      prefetch: ${ECHOMIND_RABBITMQ_CHAT_REQUEST_PREFETCH:1}
    chat-response:
      concurrent-consumers: ${ECHOMIND_RABBITMQ_CHAT_RESPONSE_CONSUMERS:4}
      max-concurrent-consumers: ${ECHOMIND_RABBITMQ_CHAT_RESPONSE_MAX_CONSUMERS:4}
      prefetch: ${ECHOMIND_RABBITMQ_CHAT_RESPONSE_PREFETCH:10}
  observability:
    exporter:
      traces-exporter: ${OTEL_TRACES_EXPORTER:none}
      otlp-endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}
      otlp-protocol: ${OTEL_EXPORTER_OTLP_PROTOCOL:http/protobuf}
      service-name: ${OTEL_SERVICE_NAME:echomind}
    jaeger:
      enabled: ${ECHOMIND_OBSERVABILITY_JAEGER_ENABLED:false}
      query-url: ${ECHOMIND_OBSERVABILITY_JAEGER_QUERY_URL:}
      public-url: ${ECHOMIND_OBSERVABILITY_JAEGER_PUBLIC_URL:${ECHOMIND_OBSERVABILITY_JAEGER_QUERY_URL:}}
      service-name: ${ECHOMIND_OBSERVABILITY_JAEGER_SERVICE_NAME:${OTEL_SERVICE_NAME:echomind}}
      timeout-seconds: ${ECHOMIND_OBSERVABILITY_JAEGER_TIMEOUT_SECONDS:5}
      default-limit: ${ECHOMIND_OBSERVABILITY_JAEGER_DEFAULT_LIMIT:20}
  alerts:
    feishu:
      webhook-url: ${Webhook:}
  models:
    default-provider: deepseek
    providers:
      deepseek:
        api-key: ${DEEPSEEK_API_KEY:${ANTHROPIC_API_KEY:}}
        base-url: ${DEEPSEEK_BASE_URL:${ANTHROPIC_BASE_URL:https://api.deepseek.com}}
        max-tokens: ${DEEPSEEK_MAX_TOKENS:4096}
        models:
          - name: deepseek-v4-flash
            capabilities: [text, function]
            default: true
      aliyun-bailian:
        api-key: ${ALIYUN_BAILIAN_API_KEY:}
        base-url: ${ALIYUN_BAILIAN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
        models:
          - name: qwen3.7-max
            capabilities: [text, function]
            default: true
          - name: qwen3.6-plus
            capabilities: [text, function, vision]
            default: false
          - name: qwen3.6-flash
            capabilities: [text, function]
            default: false
          - name: qwen3.5-omni-plus
            capabilities: [text, vision]
            default: false
          - name: qwen-vl-plus
            capabilities: [text, vision]
            default: false
          - name: qwen-vl-max
            capabilities: [text, vision]
            default: false
      # ---- 以下为参考示例，取消注释并填入凭证即可启用 ----
      # tongyi:
      #   api-key: ${DASHSCOPE_API_KEY:}
      #   base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      #   models:
      #     - name: qwen3.7-max
      #       capabilities: [text, function]
      #       default: true
      # ollama:
      #   api-key: ollama
      #   base-url: http://localhost:11434/v1
      #   models:
      #     - name: llama3.2
      #       capabilities: [text, function]
      #       default: true
  memory:
    short-term-window: ${ECHOMIND_MEMORY_SHORT_TERM_WINDOW:80}
    short-term-max-chars: ${ECHOMIND_MEMORY_SHORT_TERM_MAX_CHARS:12000}
    short-term-message-max-chars: ${ECHOMIND_MEMORY_SHORT_TERM_MESSAGE_MAX_CHARS:1500}
    # MySQL 保存完整会话供前端展示；Redis 只保存最近 short-term-window 条且不超过 short-term-max-chars 的 LLM 上下文。
    redis-ttl-seconds: 604800
    embedding-enabled: true
    embedding-base-url: ${ALIYUN_BAILIAN_EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com}
    embedding-api-key: ${ALIYUN_BAILIAN_API_KEY:}
    embedding-model: tongyi-embedding-vision-plus
    legacy-vector-index-name: ${ECHOMIND_MEMORY_LEGACY_VECTOR_INDEX_NAME:idx:echomind:memory:vectors}
    legacy-vector-key-prefix: ${ECHOMIND_MEMORY_LEGACY_VECTOR_KEY_PREFIX:echomind:memory:vector:}
    persist-queue-name: ${ECHOMIND_MEMORY_PERSIST_QUEUE_NAME:echomind.chat-memory.persist.requests}
    persist-exchange-name: ${ECHOMIND_MEMORY_PERSIST_EXCHANGE_NAME:echomind.chat-memory.persist.exchange}
    # 普通聊天记忆按 sessionId hash 到多个队列；每个分片单消费者，避免同一会话乱序。
    persist-shards: ${ECHOMIND_MEMORY_PERSIST_SHARDS:8}
    async-persist-enabled: ${ECHOMIND_MEMORY_ASYNC_PERSIST_ENABLED:true}
    summary-max-chars: 3000
    summary-refresh-interval: 6
    knowledge-top-k: ${ECHOMIND_MEMORY_KNOWLEDGE_TOP_K:4}
    knowledge-chunk-size: ${ECHOMIND_MEMORY_KNOWLEDGE_CHUNK_SIZE:1000}
    knowledge-chunk-overlap: ${ECHOMIND_MEMORY_KNOWLEDGE_CHUNK_OVERLAP:150}
    knowledge-min-vector-similarity: ${ECHOMIND_MEMORY_KNOWLEDGE_MIN_VECTOR_SIMILARITY:0.25}
    knowledge-vector-weight: ${ECHOMIND_MEMORY_KNOWLEDGE_VECTOR_WEIGHT:0.75}
    knowledge-keyword-weight: ${ECHOMIND_MEMORY_KNOWLEDGE_KEYWORD_WEIGHT:0.25}
    knowledge-keyword-candidate-limit: ${ECHOMIND_MEMORY_KNOWLEDGE_KEYWORD_CANDIDATE_LIMIT:40}
    knowledge-vector-index-name: ${ECHOMIND_MEMORY_KNOWLEDGE_VECTOR_INDEX_NAME:idx:echomind:agent:knowledge:vectors}
    knowledge-vector-key-prefix: ${ECHOMIND_MEMORY_KNOWLEDGE_VECTOR_KEY_PREFIX:echomind:agent:knowledge:vector:}
    knowledge-ocr-enabled: ${ECHOMIND_MEMORY_KNOWLEDGE_OCR_ENABLED:true}
    knowledge-ocr-language: ${ECHOMIND_MEMORY_KNOWLEDGE_OCR_LANGUAGE:chi_sim+eng}
    knowledge-ocr-dpi: ${ECHOMIND_MEMORY_KNOWLEDGE_OCR_DPI:200}
    knowledge-ocr-min-text-chars: ${ECHOMIND_MEMORY_KNOWLEDGE_OCR_MIN_TEXT_CHARS:80}
    knowledge-ocr-max-pages: ${ECHOMIND_MEMORY_KNOWLEDGE_OCR_MAX_PAGES:20}
    knowledge-ocr-tesseract-command: ${ECHOMIND_MEMORY_KNOWLEDGE_OCR_TESSERACT_COMMAND:tesseract}
    # 最终 prompt 兜底预算：历史、摘要和知识库都会在进入模型前统一裁剪。
    prompt-max-chars: ${ECHOMIND_MEMORY_PROMPT_MAX_CHARS:24000}
    prompt-max-system-message-chars: ${ECHOMIND_MEMORY_PROMPT_MAX_SYSTEM_MESSAGE_CHARS:12000}
    prompt-max-history-message-chars: ${ECHOMIND_MEMORY_PROMPT_MAX_HISTORY_MESSAGE_CHARS:4000}
  user-memory:
    enabled: ${USER_MEMORY_ENABLED:true}
    queue-name: ${USER_MEMORY_QUEUE_NAME:echomind.user-memory.requests}
    top-k: ${USER_MEMORY_TOP_K:5}
    min-confidence: ${USER_MEMORY_MIN_CONFIDENCE:0.3}
    vector-index-name: ${USER_MEMORY_VECTOR_INDEX_NAME:idx:user:memory:vectors}
    vector-key-prefix: ${USER_MEMORY_VECTOR_KEY_PREFIX:user:memory:vector:}
    profile-key-prefix: ${USER_MEMORY_PROFILE_KEY_PREFIX:echomind:user-profile:snapshot:}
    existing-profile-limit: ${USER_MEMORY_EXISTING_PROFILE_LIMIT:30}
    max-extracted-entries: ${USER_MEMORY_MAX_EXTRACTED_ENTRIES:10}
    batch-size: ${USER_MEMORY_BATCH_SIZE:5}
    related-fact-top-k: ${USER_MEMORY_RELATED_FACT_TOP_K:12}
    profile-max-chars: ${USER_MEMORY_PROFILE_MAX_CHARS:2000}
    buffer-lock-ttl-seconds: ${USER_MEMORY_BUFFER_LOCK_TTL_SECONDS:60}
    buffer-ttl-days: ${USER_MEMORY_BUFFER_TTL_DAYS:7}
    extractor-model-id: ${USER_MEMORY_EXTRACTOR_MODEL_ID:}
  skill:
    auto-load-path: ./skills/
    hot-reload: true
    marketplace-dir: ./data/marketplace/
  storage:
    # mode=oss 时写入阿里云 OSS；环境变量不完整时自动回退 local，避免开发/测试启动失败。
    mode: ${ECHOMIND_STORAGE_MODE:oss}
    local-dir: ${ECHOMIND_STORAGE_LOCAL_DIR:./data/objects/}
    endpoint: ${ALIYUN_OSS_ENDPOINT:}
    bucket: ${ALIYUN_OSS_BUCKET:echo-mind2144}
    access-key-id: ${ALIBABA_CLOUD_ACCESS_KEY_ID:${AccessKeyID:${ALIYUN_ACCESS_KEY_ID:}}}
    access-key-secret: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET:${AccessKeySecret:${ALIYUN_ACCESS_KEY_SECRET:}}}
  mcp:
    external-servers:
      - id: nowcoder-java-interview
        enabled: true
        transport: stdio
        command:
          - java
          - -jar
          - ${NOWCODER_MCP_JAR:D:\claudeWorkSpace\nowcoder-java-interview-mcp-server\target\nowcoder-java-interview-mcp-server-1.0.0.jar}
        working-directory: ${NOWCODER_MCP_WORKDIR:D:\claudeWorkSpace\nowcoder-java-interview-mcp-server}
  runtime:
    agent-bootstrap:
      default-skill-merge-ids: [markdown-code, date-query, github-intel, 12306, travel-planning]
      model-migrations:
        - from-prefix: anthropic:claude-
          to-model-id: deepseek:deepseek-v4-flash
        - from-prefix: openai:gpt-
          to-model-id: deepseek:deepseek-v4-flash
        - from: deepseek:deepseek-chat
          to-model-id: deepseek:deepseek-v4-flash
    retired-skills:
      skill-ids: [qq-mail]
      prompt-replacements:
        - from: "、旅行规划和 QQ 邮箱工具"
          to: "和旅行规划"
        - from: "、旅行规划、QQ 邮箱工具"
          to: "、旅行规划"
        - from: "、QQ 邮箱工具"
          to: ""
        - from: "和 QQ 邮箱工具"
          to: ""
        - from: "QQ 邮箱工具"
          to: ""
        - from: "QQ邮箱工具"
          to: ""
        - from: "QQ Mail"
          to: ""
        - from: "and QQ Mail"
          to: ""
        - from: "or mail"
          to: ""
        - from: "mail,"
          to: ""
        - from: "邮箱工具"
          to: ""
        - from: "或邮件任务"
          to: ""
        - from: "、邮件"
          to: ""
        - from: "，邮件"
          to: ""
  web-search:
    searxng-url: ${SEARXNG_URL:http://localhost:8082}
  agents:
    - agent-id: default
      name: EchoMind Assistant
      system-prompt: "You are a helpful AI assistant. You have access to tools for web search, weather, calculations, date/time queries, Markdown code formatting, GitHub repository intelligence, 12306 train queries, and travel planning. When the user asks about dates/times, train tickets, or itinerary planning, use the matching tool instead of guessing. For 12306 train tickets, return available seats and fares; when the user asks for transfers or there is no direct train, include transfer options. When outputting code, use fenced Markdown code blocks with the correct language label."
      model-id: deepseek:deepseek-v4-flash
      skill-ids: [weather-query, calculator, web-search, markdown-code, date-query, github-intel, 12306, travel-planning]

knife4j:
  enable: true
  setting:
    language: zh_cn
