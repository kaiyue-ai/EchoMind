services:
  # ===== MySQL 数据库 =====
  mysql:
    image: mysql:8.3
    container_name: echomind-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: echomind_root
      MYSQL_DATABASE: echomind
      MYSQL_USER: echomind
      MYSQL_PASSWORD: echomind_secret
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pechomind_root"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Redis Stack（近期上下文热缓存 + 向量检索） =====
  redis:
    image: redis/redis-stack-server:latest
    container_name: echomind-cache
    restart: unless-stopped
    environment:
      REDIS_ARGS: "--appendonly yes"
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ===== SearXNG 元搜索引擎 =====
  searxng:
    image: searxng/searxng:latest
    container_name: echomind-searxng
    restart: unless-stopped
    ports:
      - "8082:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8082/
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    networks:
      - echomind-network

  # ===== RabbitMQ 消息队列 =====
  rabbitmq:
    image: rabbitmq:3-management
    container_name: echomind-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: echomind
      RABBITMQ_DEFAULT_PASS: echomind_secret
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ===== EchoMind 后端 =====
  backend:
    image: ai-agent-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.runtime
    container_name: echomind-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      # LLM API 配置
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-${ANTHROPIC_API_KEY:-}}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-${ANTHROPIC_BASE_URL:-https://api.deepseek.com}}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ALIYUN_BAILIAN_API_KEY: ${ALIYUN_BAILIAN_API_KEY:-}
      ALIYUN_BAILIAN_BASE_URL: ${ALIYUN_BAILIAN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      ALIYUN_BAILIAN_EMBEDDING_BASE_URL: ${ALIYUN_BAILIAN_EMBEDDING_BASE_URL:-https://dashscope.aliyuncs.com}
      # 阿里云 OSS：优先读取阿里云标准变量，兼容旧的 AccessKeyID / AccessKeySecret。
      ECHOMIND_STORAGE_MODE: ${ECHOMIND_STORAGE_MODE:-oss}
      ALIYUN_OSS_ENDPOINT: ${ALIYUN_OSS_ENDPOINT:-https://oss-cn-beijing.aliyuncs.com}
      ALIYUN_OSS_BUCKET: ${ALIYUN_OSS_BUCKET:-echo-mind2144}
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${ALIBABA_CLOUD_ACCESS_KEY_ID:-}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET:-}
      AccessKeyID: ${ALIBABA_CLOUD_ACCESS_KEY_ID:-${AccessKeyID:-}}
      AccessKeySecret: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET:-${AccessKeySecret:-}}
      # 数据库配置
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/echomind?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: echomind
      SPRING_DATASOURCE_PASSWORD: echomind_secret
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      # Redis 配置
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # RabbitMQ 配置
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: echomind
      SPRING_RABBITMQ_PASSWORD: echomind_secret
      ECHOMIND_RABBITMQ_CHAT_REQUEST_CONSUMERS: ${ECHOMIND_RABBITMQ_CHAT_REQUEST_CONSUMERS:-20}
      ECHOMIND_RABBITMQ_CHAT_REQUEST_MAX_CONSUMERS: ${ECHOMIND_RABBITMQ_CHAT_REQUEST_MAX_CONSUMERS:-20}
      ECHOMIND_RABBITMQ_CHAT_REQUEST_PREFETCH: ${ECHOMIND_RABBITMQ_CHAT_REQUEST_PREFETCH:-1}
      ECHOMIND_RABBITMQ_CHAT_RESPONSE_CONSUMERS: ${ECHOMIND_RABBITMQ_CHAT_RESPONSE_CONSUMERS:-4}
      ECHOMIND_RABBITMQ_CHAT_RESPONSE_MAX_CONSUMERS: ${ECHOMIND_RABBITMQ_CHAT_RESPONSE_MAX_CONSUMERS:-4}
      ECHOMIND_RABBITMQ_CHAT_RESPONSE_PREFETCH: ${ECHOMIND_RABBITMQ_CHAT_RESPONSE_PREFETCH:-10}
      # EchoMind 配置
      ECHOMIND_MEMORY_SHORT_TERM_WINDOW: ${ECHOMIND_MEMORY_SHORT_TERM_WINDOW:-80}
      ECHOMIND_MEMORY_SHORT_TERM_MAX_CHARS: ${ECHOMIND_MEMORY_SHORT_TERM_MAX_CHARS:-12000}
      ECHOMIND_MEMORY_SHORT_TERM_MESSAGE_MAX_CHARS: ${ECHOMIND_MEMORY_SHORT_TERM_MESSAGE_MAX_CHARS:-1500}
      ECHOMIND_MEMORY_PERSIST_QUEUE_NAME: echomind.chat-memory.persist.requests
      ECHOMIND_MEMORY_PERSIST_EXCHANGE_NAME: echomind.chat-memory.persist.exchange
      ECHOMIND_MEMORY_PERSIST_SHARDS: ${ECHOMIND_MEMORY_PERSIST_SHARDS:-8}
      ECHOMIND_MEMORY_ASYNC_PERSIST_ENABLED: ${ECHOMIND_MEMORY_ASYNC_PERSIST_ENABLED:-true}
      ECHOMIND_MEMORY_EMBEDDING_MODEL: tongyi-embedding-vision-plus
      USER_MEMORY_ENABLED: ${USER_MEMORY_ENABLED:-true}
      USER_MEMORY_QUEUE_NAME: echomind.user-memory.requests
      USER_MEMORY_FLUSH_QUEUE_NAME: echomind.user-memory.flush.requests
      USER_MEMORY_VECTOR_INDEX_NAME: "idx:user:memory:vectors"
      USER_MEMORY_VECTOR_KEY_PREFIX: "user:memory:vector:"
      USER_MEMORY_PROFILE_KEY_PREFIX: "echomind:user-profile:snapshot:"
      USER_MEMORY_BATCH_SIZE: ${USER_MEMORY_BATCH_SIZE:-5}
      USER_MEMORY_BUFFER_MAX_CHARS: ${USER_MEMORY_BUFFER_MAX_CHARS:-8000}
      USER_MEMORY_BUFFER_IDLE_FLUSH_SECONDS: ${USER_MEMORY_BUFFER_IDLE_FLUSH_SECONDS:-1800}
      USER_MEMORY_SCAN_IDLE_BUFFERS_SECONDS: ${USER_MEMORY_SCAN_IDLE_BUFFERS_SECONDS:-60}
      USER_MEMORY_IMPORTANT_SIGNAL_CONFIDENCE_THRESHOLD: ${USER_MEMORY_IMPORTANT_SIGNAL_CONFIDENCE_THRESHOLD:-0.7}
      USER_MEMORY_RELATED_FACT_TOP_K: ${USER_MEMORY_RELATED_FACT_TOP_K:-12}
      USER_MEMORY_PROFILE_MAX_CHARS: ${USER_MEMORY_PROFILE_MAX_CHARS:-2000}
      USER_MEMORY_BUFFER_LOCK_TTL_SECONDS: ${USER_MEMORY_BUFFER_LOCK_TTL_SECONDS:-60}
      USER_MEMORY_BUFFER_TTL_DAYS: ${USER_MEMORY_BUFFER_TTL_DAYS:-7}
      # OpenTelemetry：本地管理端默认启用 Trace 导出，后端只等待 Collector 启动，不依赖观测健康状态。
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-echomind}
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-otlp}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-none}
      OTEL_LOGS_EXPORTER: ${OTEL_LOGS_EXPORTER:-none}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=local}
      ECHOMIND_OBSERVABILITY_JAEGER_ENABLED: ${ECHOMIND_OBSERVABILITY_JAEGER_ENABLED:-true}
      ECHOMIND_OBSERVABILITY_JAEGER_QUERY_URL: ${ECHOMIND_OBSERVABILITY_JAEGER_QUERY_URL:-http://jaeger:16686}
      ECHOMIND_OBSERVABILITY_JAEGER_PUBLIC_URL: ${ECHOMIND_OBSERVABILITY_JAEGER_PUBLIC_URL:-http://localhost:16686}
      ECHOMIND_OBSERVABILITY_JAEGER_SERVICE_NAME: ${ECHOMIND_OBSERVABILITY_JAEGER_SERVICE_NAME:-echomind}
      # 飞书自定义机器人告警 Webhook
      Webhook: ${Webhook:-}
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      ECHOMIND_SKILL_AUTO_LOAD_PATH: /app/skills/
      ECHOMIND_SKILL_MARKETPLACE_DIR: /app/data/marketplace/
      ECHOMIND_MCP_EXTERNAL_SERVERS_0_ID: nowcoder-java-interview
      ECHOMIND_MCP_EXTERNAL_SERVERS_0_ENABLED: "true"
      ECHOMIND_MCP_EXTERNAL_SERVERS_0_TRANSPORT: stdio
      ECHOMIND_MCP_EXTERNAL_SERVERS_0_COMMAND_0: java
      ECHOMIND_MCP_EXTERNAL_SERVERS_0_COMMAND_1: -jar
      ECHOMIND_MCP_EXTERNAL_SERVERS_0_COMMAND_2: /app/mcp/nowcoder-java-interview-mcp-server-1.0.0.jar
      ECHOMIND_MCP_EXTERNAL_SERVERS_0_WORKING_DIRECTORY: /app/mcp
      # JVM 配置
      JAVA_OPTS: "-Xms512m -Xmx1024m"
    ports:
      - "8080:8080"
    volumes:
      - echomind_data:/app/data
      - ${HOST_MOUNT_PATH:-C:\Users\Jimmy}:/mnt/host
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ===== EchoMind 用户长期记忆 Worker =====
  user-memory:
    image: ai-agent-user-memory:latest
    build:
      context: .
      dockerfile: Dockerfile.user-memory
    container_name: echomind-user-memory
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: echomind
      RABBITMQ_PASSWORD: echomind_secret
      USER_MEMORY_ENABLED: ${USER_MEMORY_ENABLED:-true}
      USER_MEMORY_QUEUE_NAME: echomind.user-memory.requests
      USER_MEMORY_FLUSH_QUEUE_NAME: echomind.user-memory.flush.requests
      USER_MEMORY_VECTOR_INDEX_NAME: "idx:user:memory:vectors"
      USER_MEMORY_VECTOR_KEY_PREFIX: "user:memory:vector:"
      USER_MEMORY_PROFILE_KEY_PREFIX: "echomind:user-profile:snapshot:"
      USER_MEMORY_BATCH_SIZE: ${USER_MEMORY_BATCH_SIZE:-5}
      USER_MEMORY_BUFFER_MAX_CHARS: ${USER_MEMORY_BUFFER_MAX_CHARS:-8000}
      USER_MEMORY_BUFFER_IDLE_FLUSH_SECONDS: ${USER_MEMORY_BUFFER_IDLE_FLUSH_SECONDS:-1800}
      USER_MEMORY_SCAN_IDLE_BUFFERS_SECONDS: ${USER_MEMORY_SCAN_IDLE_BUFFERS_SECONDS:-60}
      USER_MEMORY_IMPORTANT_SIGNAL_CONFIDENCE_THRESHOLD: ${USER_MEMORY_IMPORTANT_SIGNAL_CONFIDENCE_THRESHOLD:-0.7}
      USER_MEMORY_RELATED_FACT_TOP_K: ${USER_MEMORY_RELATED_FACT_TOP_K:-12}
      USER_MEMORY_PROFILE_MAX_CHARS: ${USER_MEMORY_PROFILE_MAX_CHARS:-2000}
      USER_MEMORY_BUFFER_LOCK_TTL_SECONDS: ${USER_MEMORY_BUFFER_LOCK_TTL_SECONDS:-60}
      USER_MEMORY_BUFFER_TTL_DAYS: ${USER_MEMORY_BUFFER_TTL_DAYS:-7}
      USER_MEMORY_EXTRACTOR_MODEL_ID: ${USER_MEMORY_EXTRACTOR_MODEL_ID:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-${ANTHROPIC_API_KEY:-}}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-${ANTHROPIC_BASE_URL:-https://api.deepseek.com}}
      ALIYUN_BAILIAN_API_KEY: ${ALIYUN_BAILIAN_API_KEY:-}
      ALIYUN_BAILIAN_BASE_URL: ${ALIYUN_BAILIAN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      ALIYUN_BAILIAN_EMBEDDING_BASE_URL: ${ALIYUN_BAILIAN_EMBEDDING_BASE_URL:-https://dashscope.aliyuncs.com}
      JAVA_OPTS: "-Xms256m -Xmx512m"
    networks:
      - echomind-network

  # ===== EchoMind 前端（Vue 3） =====
  frontend:
    image: ai-agent-frontend:latest
    build:
      context: ./echomind-web
      dockerfile: Dockerfile.runtime
    container_name: echomind-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - echomind-network

  # ===== EchoMind 管理端（项目三，独立端口） =====
  admin-frontend:
    image: ai-agent-admin-frontend:latest
    build:
      context: ./echomind-web
      dockerfile: Dockerfile.admin-runtime
    container_name: echomind-admin-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8081:80"
    networks:
      - echomind-network

  # ===== OpenTelemetry Collector（本地 Trace 导出） =====
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.126.0
    container_name: echomind-otel-collector
    restart: unless-stopped
    depends_on:
      jaeger:
        condition: service_started
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./docker/otel/collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - echomind-network

  # ===== Jaeger 查询后端（管理端 Trace 页面读取） =====
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    container_name: echomind-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
    networks:
      - echomind-network

  # ===== Portainer（可选，容器管理） =====
  portainer:
    image: portainer/portainer-ce:latest
    container_name: echomind-portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - "9443:9443"
    networks:
      - echomind-network
    profiles:
      - management

volumes:
  mysql_data:
  redis_data:
  echomind_data:
  portainer_data:

networks:
  echomind-network:
    driver: bridge
