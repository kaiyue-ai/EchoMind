use_default_settings: true

server:
  secret_key: "echomind-searxng-internal-key-CHANGE-IN-PRODUCTION"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false

search:
  safe_search: 0
  formats:
    - html
    - json

engines:
  - name: google
    engine: google
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    disabled: false
  - name: bing
    engine: bing
    disabled: false
  - name: wikipedia
    engine: wikipedia
    disabled: false
  - name: baidu
    engine: baidu
    disabled: false
